<div style="background:#0e0e0e;border:1px solid #1E1E1E;border-radius:8px;padding:11px;margin-top:8px">
    <div style="font-weight:700;font-size:13.5px">{city}</div>
    <div style="color:#555;font-size:11.5px;margin:3px 0 10px">{description}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
        <div style="background:#141414;border:1px solid #1E1E1E;border-radius:5px;padding:5px 8px;font-size:12px;color:#E8192C;font-weight:700">
            {temp_c}&deg;C
        </div>
        <div style="background:#141414;border:1px solid #1E1E1E;border-radius:5px;padding:5px 8px;font-size:12px;color:#888">
            Feels {feels_like_c}&deg;C
        </div>
        <div style="background:#141414;border:1px solid #1E1E1E;border-radius:5px;padding:5px 8px;font-size:12px;color:#888">
            {humidity}% humidity
        </div>
        <div style="background:#141414;border:1px solid #1E1E1E;border-radius:5px;padding:5px 8px;font-size:12px;color:#888">
            {wind_kmph} km/h
        </div>
    </div>
    <div style="border-top:1px solid #1E1E1E;margin-top:10px;padding-top:8px">{forecast_html}</div>
</div>
